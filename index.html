<!DOCTYPE html>
<html>
<head>
    <title>Class of 2024 Vault</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fdf6e3; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { width: 200px; background: white; padding: 15px; border: 1px solid #ddd; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        .photo { width: 100%; height: 150px; object-fit: cover; filter: grayscale(100%); }
        .unlocked .photo { filter: grayscale(0%); }
        .status { font-size: 0.8rem; color: #888; margin-top: 10px; }
        .secret { font-style: italic; color: #2c3e50; display: none; }
        .unlocked .secret { display: block; }
        .unlocked .lock-icon { display: none; }
    </style>
</head>
<body>
    <h1>🎓 The Digital Time Capsule</h1>
    <div class="grid" id="memory-grid"></div>

    <script>
        async function loadMemories() {
            const response = await fetch('memories.json');
            const memories = await response.json();
            const grid = document.getElementById('memory-grid');
            const now = new Date();

            memories.forEach(m => {
                const unlockDate = new Date(m.unlock_date);
                const isLocked = now < unlockDate;
                
                // Decode the Base64 message
                const decodedMsg = atob(m.message);

                const card = document.createElement('div');
                card.className = `card ${isLocked ? 'locked' : 'unlocked'}`;
                card.innerHTML = `
                    <img src="${m.image}" class="photo">
                    <h3>${m.name}</h3>
                    <div class="lock-icon">🔒 Locked until ${m.unlock_date}</div>
                    <p class="secret">"${decodedMsg}"</p>
                    <div class="status">${isLocked ? 'Wait for it...' : 'Reunion Ready! ✅'}</div>
                `;
                grid.appendChild(card);
            });
        }
        loadMemories();
    </script>
</body>
</html>
